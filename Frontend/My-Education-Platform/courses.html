<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جميع الكورسات - منصة تعليمية</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-graduation-cap"></i> EduPlatform</h2>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="courses.html" class="active">الكورسات</a>
                <a href="#" id="dashboardLink">لوحة التحكم</a>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="بحث عن كورس...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div class="user-menu" id="userMenu">
                    <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
                    <button class="register-btn" id="registerBtn">إنشاء حساب</button>
                </div>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="courses-page" style="margin-top: 100px;">
        <div class="container">
            <h1 class="section-title">جميع الكورسات المتاحة</h1>
            <div class="courses-grid" id="allCoursesGrid">
                <!-- سيتم تحميل الكورسات هنا -->
            </div>
        </div>
    </section>

    <div id="loginModal" class="modal">...</div>
    <div id="registerModal" class="modal">...</div>
    <div id="dashboardModal" class="modal dashboard-modal">...</div>
    <div id="notificationContainer" class="notification-container"></div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            displayCourses('allCoursesGrid');
        });
    </script>
</body>
</html>
